# ===================================================================
# 1. APPLICATION & SYSTEM MANAGEMENT
# ===================================================================
spring.application.name=spring-ai-redis
server.port=8001

# ===================================================================
# 2. OLLAMA CONFIGURATION (Local LLM & Embeddings)
# ===================================================================
# Point to your local Ollama instance (default port is 11434)
spring.ai.ollama.base-url=http://localhost:11434

# Configure Ollama Chat/Generation Model (Optional, e.g., llama3, mistral, deepseek-r1)
spring.ai.ollama.chat.model=tinyllama

# Instruct Spring AI to specifically prioritize Ollama for embedding generation
spring.ai.ollama.embedding.model=nomic-embed-text

# ===================================================================
# 3. STANDARD REDIS CONNECTION PROPERTIES
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===================================================================
# 4. SPRING AI REDIS VECTOR STORE PROPERTIES
# ===================================================================
# CRITICAL: Automatically builds the metadata schema and search indices on startup.
spring.ai.vectorstore.redis.initialize-schema=true

# Name of the index structure inside Redis Search
spring.ai.vectorstore.redis.index-name=product-index

# Prefix applied to the keys inside your Redis database (maps to "items:*" or similar)
spring.ai.vectorstore.redis.prefix=product

# Mathematical calculation used for similarity metrics (COSINE, L2, or IP)
spring.ai.vectorstore.redis.distance-metric=COSINE

# --- Manual Database Script Initialization ---
spring.sql.init.mode=always

# --- Spring Core Overrides ---
spring.main.allow-bean-definition-overriding=true

# Multipart File
spring.servlet.multipart.max-file-size=50MB


# FIRST RUN THIS COMMAND IN TERMINAL
# docker run -d --name redis-stack -p 6379:6379 -p 8080:8080 redis/redis-stack:latest